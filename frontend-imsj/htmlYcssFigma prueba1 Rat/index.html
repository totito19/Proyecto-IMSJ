<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ingreso | IMSJ Educación Vial</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
  <main>
    <header>
      <h1>IMSJ Educación Vial</h1>
      <p>Panel administrativo</p>
    </header>

    <form action="agenda.html" method="get">
      <fieldset>
        <legend>Iniciar sesión</legend>

        <p>
          <label for="correo">Correo electrónico</label><br>
          <input id="correo" name="correo" type="email" placeholder="usuario@imsj.gub.uy" required>
        </p>

        <p>
          <label for="contrasena">Contraseña</label><br>
          <input id="contrasena" name="contrasena" type="password" required>
        </p>

        <button type="submit">Ingresar</button>
      </fieldset>
    </form>

    <p>Acceso exclusivo para personal autorizado</p>
  </main>

  <footer>
    <p>Intendencia de San José · Sistema interno</p>
  </footer>
</body>
</html>

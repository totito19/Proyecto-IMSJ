<!doctype html>
<html lang="es-UY">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Preguntas Frecuentes · IMSJ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/common.js" defer></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
  <div id="navbar" data-active="faq"></div>

  <main class="flex-1 max-w-3xl mx-auto w-full px-4 py-8">
    <header class="mb-6">
      <h1 class="text-3xl font-bold text-slate-800">Preguntas Frecuentes</h1>
    </header>

    <div id="alert-container" class="mb-4"></div>

    <section id="faq-list" class="space-y-3">
      <p class="text-slate-500">Cargando…</p>
    </section>
  </main>

  <div id="footer"></div>

  <script>
    function escapeHtml(s){
      return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    async function cargar() {
      try {
        const items = await API.get('/preguntas-frecuentes/publicadas');
        const cont = document.getElementById('faq-list');
        if (!items.length) {
          cont.innerHTML = '<p class="text-slate-500">No hay preguntas frecuentes publicadas.</p>';
          return;
        }
        cont.innerHTML = items.map(p => `
          <details class="bg-white border rounded-lg p-4 group" >
            <summary class="font-semibold cursor-pointer flex items-center justify-between">
              <span>${escapeHtml(p.pregunta)}</span>
              <svg class="w-5 h-5 transform group-open:rotate-180 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
            </summary>
            <div class="mt-3 text-slate-700 prose-cuerpo">${escapeHtml(p.respuesta)}</div>
            ${(p.enlaces && p.enlaces.length) ? `
              <ul class="mt-3 list-disc pl-5 text-sm">
                ${p.enlaces.map(e => `<li><a class="text-blue-700 underline" href="${e.url}" target="_blank" rel="noopener">${escapeHtml(e.titulo)}</a></li>`).join('')}
              </ul>` : ''}
          </details>
        `).join('');
      } catch {
        showAlert('No se pudieron cargar las preguntas.', 'error');
      }
    }
    document.addEventListener('DOMContentLoaded', cargar);
  </script>
</body>
</html>

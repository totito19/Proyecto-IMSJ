<!doctype html>
<html lang="es-UY">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cartelera de Noticias · IMSJ Tránsito</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/common.js" defer></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
  <div id="navbar" data-active="noticias"></div>

  <main class="flex-1 max-w-6xl mx-auto w-full px-4 py-8">
    <header class="mb-8">
      <h1 class="text-3xl font-bold text-slate-800">Cartelera de Noticias</h1>
      <p class="text-slate-600">Anuncios vigentes de la Sección Tránsito de la IMSJ.</p>
    </header>

    <div id="alert-container" class="mb-4"></div>

    <section id="noticias-list" class="grid gap-6 md:grid-cols-2">
      <!-- Skeleton -->
      <div class="bg-white rounded-lg shadow p-4">
        <div class="skeleton h-48 mb-3 rounded"></div>
        <div class="skeleton h-6 w-3/4 mb-2 rounded"></div>
        <div class="skeleton h-4 w-full mb-1 rounded"></div>
        <div class="skeleton h-4 w-5/6 rounded"></div>
      </div>
      <div class="bg-white rounded-lg shadow p-4">
        <div class="skeleton h-48 mb-3 rounded"></div>
        <div class="skeleton h-6 w-3/4 mb-2 rounded"></div>
        <div class="skeleton h-4 w-full mb-1 rounded"></div>
        <div class="skeleton h-4 w-5/6 rounded"></div>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <!-- Modal de detalle -->
  <div id="modal" class="hidden fixed inset-0 bg-black/50 z-40 flex items-start justify-center overflow-y-auto p-4">
    <div class="bg-white rounded-lg max-w-2xl w-full mt-10 shadow-lg">
      <div class="flex items-center justify-between p-4 border-b">
        <h2 id="modal-titulo" class="text-xl font-bold"></h2>
        <button id="modal-cerrar" class="text-slate-500 hover:text-slate-900 text-2xl leading-none">&times;</button>
      </div>
      <div id="modal-body" class="p-4"></div>
    </div>
  </div>

  <script>
    async function cargar() {
      try {
        const noticias = await API.get('/noticias/publicadas');
        const cont = document.getElementById('noticias-list');
        if (!noticias.length) {
          cont.innerHTML = '<p class="text-slate-600 col-span-full text-center py-12">No hay noticias publicadas en este momento.</p>';
          return;
        }
        cont.innerHTML = noticias.map(n => `
          <article class="bg-white rounded-lg shadow hover:shadow-lg transition cursor-pointer overflow-hidden"
                   data-id="${n.id}">
            ${n.imagen_portada
              ? `<img src="${window.APP_CONFIG.API_BASE.replace('/api','')}/storage/${n.imagen_portada}"
                      alt="" class="w-full h-48 object-cover">`
              : `<div class="w-full h-48 bg-gradient-to-br from-blue-100 to-blue-300 flex items-center justify-center">
                   <svg class="w-16 h-16 text-blue-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                     <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                           d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10l4 4v10a2 2 0 01-2 2z"/>
                   </svg>
                 </div>`}
            <div class="p-4">
              <p class="text-xs text-slate-500">${fmtFecha(n.fecha_inicio_vigencia)}</p>
              <h2 class="font-bold text-lg mb-2">${escapeHtml(n.titulo)}</h2>
              <p class="text-slate-700 text-sm line-clamp-3">${escapeHtml(n.cuerpo.slice(0,180))}${n.cuerpo.length>180?'…':''}</p>
              <button class="mt-3 text-blue-700 font-semibold text-sm">Leer más →</button>
            </div>
          </article>
        `).join('');
        document.querySelectorAll('#noticias-list article').forEach(el => {
          el.addEventListener('click', () => verDetalle(el.dataset.id));
        });
      } catch (e) {
        showAlert('No se pudieron cargar las noticias. Verifique que el backend esté en ejecución.', 'error');
        document.getElementById('noticias-list').innerHTML = '';
      }
    }

    function escapeHtml(s){
      return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    async function verDetalle(id) {
      try {
        const n = await API.get(`/noticias/${id}`);
        document.getElementById('modal-titulo').textContent = n.titulo;
        const enlaces = (n.enlaces || []).map(e => `
          <li><a class="text-blue-700 underline" target="_blank" rel="noopener" href="${e.url}">${escapeHtml(e.titulo)}</a></li>
        `).join('');
        const galeria = (n.multimedia || []).map(m => `
          <img src="${window.APP_CONFIG.API_BASE.replace('/api','')}/storage/${m.archivo}"
               class="rounded shadow w-full" alt="">
        `).join('');
        document.getElementById('modal-body').innerHTML = `
          <p class="text-sm text-slate-500 mb-3">${fmtFecha(n.fecha_inicio_vigencia)}</p>
          ${n.imagen_portada
            ? `<img class="w-full rounded mb-4" src="${window.APP_CONFIG.API_BASE.replace('/api','')}/storage/${n.imagen_portada}" alt="">`
            : ''}
          <div class="prose-cuerpo text-slate-800 mb-4">${escapeHtml(n.cuerpo)}</div>
          ${galeria ? `<div class="grid grid-cols-2 gap-2 mb-4">${galeria}</div>` : ''}
          ${enlaces ? `<div><h3 class="font-bold mb-1">Enlaces útiles</h3><ul class="list-disc pl-5">${enlaces}</ul></div>` : ''}
        `;
        document.getElementById('modal').classList.remove('hidden');
      } catch (e) { showAlert('No se pudo cargar la noticia.', 'error'); }
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('modal-cerrar').addEventListener('click', () =>
        document.getElementById('modal').classList.add('hidden'));
      document.getElementById('modal').addEventListener('click', (e) => {
        if (e.target.id === 'modal') document.getElementById('modal').classList.add('hidden');
      });
      cargar();
    });
  </script>
</body>
</html>

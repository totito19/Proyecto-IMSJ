<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Intendencia</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<header class="navbar">
    <div class="logo">
        <img src="/frontend-publico/mimi/img Referencia/eSanjo.png" alt="">
    </div>

    <button class="menu-btn">
        ☰
    </button>
</header>

<main class="container">

    <section class="login">

        <div class="card">

            <label>Cedula*</label>
            <input type="text">

            <label>Contraseña*</label>
            <input type="password">

            <button>Enviar</button>

        </div>
    </section>
    <section class="imagen">
        <div class="container-derecho">
            <img src="/frontend-publico/mimi/img Referencia/Imagen_fachada.png" alt="Imagen de login" class="imagen-login">
        </div>
    
    </section>
</main>
</body>
</html>
